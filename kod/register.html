<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация • ChewWorld</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fef8f0;
      color: #1f1a16;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      width: 100%;
    }

    /* header */
    .header {
      padding: 20px 0 16px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      background: rgba(255, 248, 240, 0.8);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: -0.02em;
      color: #1f1a16;
      text-decoration: none;
    }

    .logo i {
      color: #e25a4a;
      font-size: 2rem;
    }

    .logo span {
      background: linear-gradient(135deg, #d94a3a, #f09b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 32px;
      font-weight: 600;
    }

    .nav a {
      text-decoration: none;
      color: #2d241e;
      font-size: 1rem;
      transition: color 0.2s;
    }

    .nav a:hover {
      color: #d94a3a;
    }

    .nav .register-btn {
      background: #1f1a16;
      color: #fef8f0;
      padding: 10px 20px;
      border-radius: 60px;
      font-weight: 700;
      transition: 0.2s;
    }

    .nav .register-btn:hover {
      background: #d94a3a;
      color: #fff;
    }

    /* main content */
    .register-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
    }

    .register-card {
      background: white;
      border-radius: 40px 20px 40px 20px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.02);
    }

    .register-card .icon-top {
      text-align: center;
      font-size: 3rem;
      color: #d94a3a;
      margin-bottom: 8px;
    }

    .register-card h1 {
      font-size: 2.2rem;
      font-weight: 800;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .register-card .subtitle {
      text-align: center;
      color: #5b4a41;
      margin-bottom: 32px;
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 700;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: #1f1a16;
    }

    .form-group label i {
      color: #d94a3a;
      width: 20px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e8ddd4;
      border-radius: 60px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
      background: #fefcf9;
    }

    .form-group input:focus {
      outline: none;
      border-color: #d94a3a;
      box-shadow: 0 0 0 4px rgba(217, 74, 58, 0.08);
    }

    .form-group input::placeholder {
      color: #b0a094;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 28px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #d94a3a;
      cursor: pointer;
    }

    .checkbox-group label {
      font-size: 0.9rem;
      color: #3d322c;
      cursor: pointer;
    }

    .checkbox-group label a {
      color: #d94a3a;
      text-decoration: none;
      font-weight: 700;
    }

    .checkbox-group label a:hover {
      text-decoration: underline;
    }

    .btn-register {
      width: 100%;
      padding: 16px;
      background: #1f1a16;
      color: #fef8f0;
      border: none;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn-register:hover {
      background: #d94a3a;
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(217, 74, 58, 0.25);
    }

    .login-link {
      text-align: center;
      margin-top: 24px;
      color: #5b4a41;
      font-size: 0.95rem;
    }

    .login-link a {
      color: #1f1a16;
      font-weight: 700;
      text-decoration: none;
      transition: 0.2s;
    }

    .login-link a:hover {
      color: #d94a3a;
      text-decoration: underline;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8ddd4;
    }

    .divider span {
      color: #b0a094;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .social-login {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .social-btn {
      padding: 12px 24px;
      border: 2px solid #e8ddd4;
      border-radius: 60px;
      background: transparent;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #1f1a16;
      flex: 1;
      justify-content: center;
    }

    .social-btn:hover {
      border-color: #d94a3a;
      background: #fef6f0;
    }

    .social-btn i {
      font-size: 1.2rem;
    }

    /* footer */
    .footer {
      padding: 24px 0 30px;
      border-top: 1px solid #e3d6cd;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-top: auto;
    }

    .footer .copy {
      color: #5b4a41;
      font-size: 0.9rem;
    }

    .footer .socials {
      display: flex;
      gap: 24px;
    }

    .footer .socials a {
      color: #2d241e;
      font-size: 1.2rem;
      transition: 0.2s;
    }

    .footer .socials a:hover {
      color: #d94a3a;
      transform: scale(1.1);
    }

    /* адаптив */
    @media (max-width: 640px) {
      .register-card {
        padding: 32px 20px;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
      .header-inner {
        flex-direction: column;
        align-items: stretch;
      }
      .nav {
        flex-wrap: wrap;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <i class="fas fa-candy-cane"></i>
        <span>ChewWorld</span>
      </a>
      <div class="nav">
        <a href="index.html">Главная</a>
        <a href="#">Каталог</a>
        <a href="#">Вкусы</a>
        <a href="register.html" class="register-btn">
          <i class="fas fa-user-plus"></i> Регистрация
        </a>
      </div>
    </div>
  </header>

  <main class="register-wrapper">
    <div class="container" style="display: flex; justify-content: center;">
      <div class="register-card">
        <div class="icon-top">
          <i class="fas fa-candy-cane"></i>
        </div>
        <h1>Создать аккаунт</h1>
        <p class="subtitle">Присоединяйся к миру вкусов ChewWorld</p>

        <form id="registerForm" onsubmit="handleRegister(event)">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName"><i class="fas fa-user"></i> Имя</label>
              <input type="text" id="firstName" placeholder="Алексей" required>
            </div>
            <div class="form-group">
              <label for="lastName"><i class="fas fa-user"></i> Фамилия</label>
              <input type="text" id="lastName" placeholder="Иванов" required>
            </div>
          </div>

          <div class="form-group">
            <label for="email"><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> Пароль</label>
            <input type="password" id="password" placeholder="Минимум 6 символов" minlength="6" required>
          </div>

          <div class="form-group">
            <label for="confirmPassword"><i class="fas fa-check-circle"></i> Подтвердите пароль</label>
            <input type="password" id="confirmPassword" placeholder="Повторите пароль" required>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="agree" required>
            <label for="agree">
              Я согласен с <a href="#">условиями использования</a> и <a href="#">политикой конфиденциальности</a>
            </label>
          </div>

          <button type="submit" class="btn-register">
            <i class="fas fa-rocket"></i> Зарегистрироваться
          </button>
        </form>

        <div class="divider">
          <span>или через соцсети</span>
        </div>

        <div class="social-login">
          <button class="social-btn" onclick="socialLogin('google')">
            <i class="fab fa-google" style="color: #ea4335;"></i> Google
          </button>
          <button class="social-btn" onclick="socialLogin('vk')">
            <i class="fab fa-vk" style="color: #4680c2;"></i> VK
          </button>
        </div>

        <div class="login-link">
          Уже есть аккаунт? <a href="#">Войти</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="container footer">
    <div class="copy">
      <i class="fas fa-candy-cane" style="color: #d94a3a;"></i> ChewWorld — жевачка с любым вкусом
    </div>
    <div class="socials">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-telegram"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
      <a href="#"><i class="fab fa-tiktok"></i></a>
    </div>
  </footer>

  <script>
    function handleRegister(event) {
      event.preventDefault();
      
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const agree = document.getElementById('agree').checked;

      // Валидация
      if (!firstName || !lastName || !email || !password || !confirmPassword) {
        alert('⚠️ Пожалуйста, заполните все поля.');
        return;
      }

      if (password.length < 6) {
        alert('⚠️ Пароль должен содержать минимум 6 символов.');
        return;
      }

      if (password !== confirmPassword) {
        alert('⚠️ Пароли не совпадают!');
        return;
      }

      if (!agree) {
        alert('⚠️ Пожалуйста, согласитесь с условиями использования.');
        return;
      }

      // Имитация успешной регистрации
      alert('✅ Поздравляем, ' + firstName + '! Вы успешно зарегистрировались в ChewWorld. 🍬\nНа вашу почту ' + email + ' отправлено письмо с подтверждением.');
      
      // Очистка формы (опционально)
      // document.getElementById('registerForm').reset();
      
      // Можно перенаправить на главную
      // window.location.href = 'index.html';
    }

    function socialLogin(provider) {
      alert('🔐 Вход через ' + provider + ' (демо-режим).\nВ реальном проекте здесь будет OAuth-авторизация.');
    }

    // Добавляем небольшую анимацию при фокусе
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.01)';
      });
      input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
      });
    });
  </script>
</body>
</html>
